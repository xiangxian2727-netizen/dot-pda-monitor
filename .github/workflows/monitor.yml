name: DOT PDA Monitor

on:
  schedule:
    # Every 10 minutes (at :00, :10, :20, :30, :40, :50 past each hour)
    # GitHub Actions cron is UTC — no timezone conversion needed
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Manual trigger for testing

jobs:
  monitor:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.52.0-focal
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run monitor
        env:
          DOT_COOKIES: ${{ secrets.DOT_COOKIES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node monitor.js

      - name: Upload screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: screenshots/
          retention-days: 7
