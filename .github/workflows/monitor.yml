name: DOT PDA Monitor

on:
  schedule:
    # Every 10 minutes (at :00, :10, :20, :30, :40, :50 past each hour)
    # GitHub Actions cron is UTC — no timezone conversion needed
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Manual trigger for testing
    inputs:
      test_notify:
        description: 'Send a test Telegram notification'
        type: boolean
        default: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run monitor
        env:
          DOT_COOKIES: ${{ secrets.DOT_COOKIES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_NOTIFY: ${{ github.event.inputs.test_notify || 'false' }}
        run: node monitor.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: screenshots/
          retention-days: 3
